<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Tracking | QR Scan Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base: #0a0d12;
    --bg-surface: #111827;
    --bg-surface-hover: #1f2937;
    --border: rgba(255,255,255,0.06);
    --border-bright: rgba(255,255,255,0.12);
    --text-primary: #f3f4f6;
    --text-secondary: #9ca3af;
    --text-muted: #6b7280;
    --accent-green: #22c55e;
    --accent-blue: #3b82f6;
    --accent-amber: #f59e0b;
    --accent-red: #ef4444;
    --accent-green-glow: rgba(34,197,94,0.15);
    --accent-blue-glow: rgba(59,130,246,0.15);
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Dot grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  /* Aurora gradient */
  .aurora {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse at 30% 50%, rgba(34,197,94,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(59,130,246,0.08) 0%, transparent 60%);
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(10,13,18,0.85);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }

  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-title { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
  .header-title span { color: var(--accent-green); }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 8px var(--accent-green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .status-text {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .refresh-btn {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--border-bright); color: var(--text-primary); }
  .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--bg-surface);
    border-radius: var(--radius-sm);
    padding: 3px;
    border: 1px solid var(--border);
  }

  .tab {
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text-secondary); }
  .tab.active { background: var(--bg-surface-hover); color: var(--text-primary); }

  /* Period selector */
  .period-selector {
    display: flex;
    gap: 2px;
    background: var(--bg-surface);
    border-radius: var(--radius-sm);
    padding: 3px;
    border: 1px solid var(--border);
  }
  .period-btn {
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s;
  }
  .period-btn:hover { color: var(--text-secondary); }
  .period-btn.active { background: var(--accent-green); color: #000; }

  /* Main layout */
  main {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  .controls-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Cards */
  .card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--border-bright); }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .kpi-value {
    font-size: 36px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }
  .kpi-value.green { color: var(--accent-green); }
  .kpi-value.blue { color: var(--accent-blue); }
  .kpi-value.amber { color: var(--accent-amber); }

  .kpi-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 6px;
  }

  .kpi-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Chart containers */
  .chart-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .chart-card h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }

  .chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  /* Table */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .data-table th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
  }
  .data-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .data-table tr:hover td { background: var(--bg-surface-hover); }
  .data-table .mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .data-table .slug-badge {
    background: var(--accent-green-glow);
    color: var(--accent-green);
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
  }
  .data-table .count-badge {
    background: var(--accent-blue-glow);
    color: var(--accent-blue);
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
  }

  /* Map */
  #map {
    height: 400px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .leaflet-container { background: #0d1117; }

  /* Recent scans feed */
  .scan-feed { display: flex; flex-direction: column; gap: 8px; }
  .scan-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .scan-item:hover { border-color: var(--border-bright); }
  .scan-slug {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent-green);
    min-width: 100px;
  }
  .scan-location {
    font-size: 13px;
    color: var(--text-secondary);
    flex: 1;
  }
  .scan-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .scan-device {
    font-size: 11px;
    color: var(--text-muted);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
  .empty-state p { font-size: 14px; }

  /* Loading spinner */
  .loading-overlay {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Links table */
  .link-url {
    color: var(--accent-blue);
    text-decoration: none;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    max-width: 300px;
    display: inline-block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .link-url:hover { text-decoration: underline; }

  .status-active {
    color: var(--accent-green);
    font-size: 12px;
    font-weight: 500;
  }
  .status-inactive {
    color: var(--accent-red);
    font-size: 12px;
    font-weight: 500;
  }

  /* Filter banner */
  .filter-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--accent-green-glow);
    border: 1px solid rgba(34,197,94,0.25);
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
    font-size: 13px;
  }
  .filter-banner .filter-label {
    color: var(--text-primary);
    font-weight: 500;
  }
  .filter-banner .filter-label span {
    color: var(--accent-green);
    font-family: 'JetBrains Mono', monospace;
  }
  .filter-banner a {
    color: var(--accent-blue);
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
  }
  .filter-banner a:hover { text-decoration: underline; }

  .slug-badge-link {
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .slug-badge-link:hover { opacity: 0.8; }

  /* Responsive */
  @media (max-width: 768px) {
    .chart-row { grid-template-columns: 1fr; }
    .card-grid { grid-template-columns: 1fr 1fr; }
    .header-inner { flex-wrap: wrap; height: auto; padding: 12px 0; gap: 8px; }
    .controls-bar { flex-direction: column; align-items: stretch; }
    .scan-item { flex-wrap: wrap; }
    .scan-device { display: none; }
    main { padding: 16px; }
  }
  @media (max-width: 480px) {
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="aurora"></div>

<header>
  <div class="header-inner">
    <div class="header-left">
      <div class="header-title"><span>QR</span> Link Tracking</div>
      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="overview">Overview</button>
        <button class="tab" data-tab="timeline">Timeline</button>
        <button class="tab" data-tab="geography">Geography</button>
        <button class="tab" data-tab="links">Links</button>
        <button class="tab" data-tab="feed">Live Feed</button>
      </div>
    </div>
    <div class="header-right">
      <a href="about.html" style="font-size:13px;color:var(--text-muted);text-decoration:none;padding:6px 12px;border-radius:var(--radius-sm);transition:all 0.15s" onmouseover="this.style.color='var(--text-primary)';this.style.background='var(--bg-surface-hover)'" onmouseout="this.style.color='var(--text-muted)';this.style.background='transparent'">How It Works</a>
      <div class="status-dot"></div>
      <span class="status-text" id="last-updated">Loading...</span>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">Refresh</button>
    </div>
  </div>
</header>

<main>
  <div class="filter-banner" id="filter-banner" style="display:none">
    <div class="filter-label">Filtering: <span id="filter-slug-name"></span></div>
    <a href="?" id="filter-clear">View All Campaigns</a>
  </div>
  <div class="controls-bar">
    <div></div>
    <div class="period-selector" id="period-selector">
      <button class="period-btn" data-days="7">7d</button>
      <button class="period-btn active" data-days="30">30d</button>
      <button class="period-btn" data-days="90">90d</button>
      <button class="period-btn" data-days="0">All</button>
    </div>
  </div>

  <!-- Overview -->
  <div class="tab-panel active" id="panel-overview">
    <div class="card-grid" id="kpi-cards"></div>
    <div class="chart-row">
      <div class="chart-card">
        <h3>Scans by Link</h3>
        <canvas id="chart-doughnut"></canvas>
      </div>
      <div class="chart-card">
        <h3>Daily Scans</h3>
        <canvas id="chart-daily-mini"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>Recent Scans</h3>
      <div id="recent-scans-overview"></div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="tab-panel" id="panel-timeline">
    <div class="chart-card">
      <h3>Scan Volume Over Time</h3>
      <canvas id="chart-timeline" height="100"></canvas>
    </div>
    <div class="chart-row">
      <div class="chart-card">
        <h3>Scans by Day of Week</h3>
        <canvas id="chart-weekday"></canvas>
      </div>
      <div class="chart-card">
        <h3>Scans by Hour</h3>
        <canvas id="chart-hourly"></canvas>
      </div>
    </div>
  </div>

  <!-- Geography -->
  <div class="tab-panel" id="panel-geography">
    <div id="map"></div>
    <div class="chart-row">
      <div class="chart-card">
        <h3>Top Cities</h3>
        <div id="geo-cities-table"></div>
      </div>
      <div class="chart-card">
        <h3>Top Zip Codes</h3>
        <div id="geo-zips-table"></div>
      </div>
    </div>
  </div>

  <!-- Links -->
  <div class="tab-panel" id="panel-links">
    <div class="chart-card">
      <h3>All Destinations</h3>
      <div id="links-table"></div>
    </div>
  </div>

  <!-- Live Feed -->
  <div class="tab-panel" id="panel-feed">
    <div class="chart-card">
      <h3>All Scans (Most Recent First)</h3>
      <div id="feed-list"></div>
    </div>
  </div>
</main>

<script>
const API_BASE = 'https://greenvilletriumph.club/api/scans';
let currentDays = 30;
let data = null;
let charts = {};
let map = null;
let mapMarkers = [];

// Campaign filter from URL
const urlParams = new URLSearchParams(window.location.search);
const filterSlug = urlParams.get('slug');

function applySlugFilter(raw) {
  if (!filterSlug) return raw;
  // Show banner
  const destMap = {};
  (raw.destinations || []).forEach(d => destMap[d.slug] = d.label);
  const label = destMap[filterSlug] || filterSlug;
  document.getElementById('filter-banner').style.display = 'flex';
  document.getElementById('filter-slug-name').textContent = label;
  document.title = label + ' | QR Scan Analytics';
  // Filter all data arrays to this slug
  return {
    ...raw,
    summary: raw.summary.filter(s => s.slug === filterSlug),
    daily: raw.daily.filter(d => d.slug === filterSlug),
    recent: raw.recent.filter(r => r.slug === filterSlug),
    geo: raw.geo, // geo is aggregated across slugs by the API, keep as-is
    zips: raw.zips, // same — no slug field
    destinations: raw.destinations.filter(d => d.slug === filterSlug)
  };
}

// Chart.js defaults
Chart.defaults.color = '#9ca3af';
Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
Chart.defaults.font.family = "'Inter', sans-serif";
Chart.defaults.plugins.legend.labels.usePointStyle = true;
Chart.defaults.plugins.legend.labels.pointStyle = 'circle';

const COLORS = ['#22c55e', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];

// Tab switching
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  if (tab.dataset.tab === 'geography' && data) {
    setTimeout(() => { if (map) map.invalidateSize(); }, 100);
  }
});

// Period switching
document.getElementById('period-selector').addEventListener('click', e => {
  const btn = e.target.closest('.period-btn');
  if (!btn) return;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentDays = parseInt(btn.dataset.days);
  loadData();
});

// Load data
async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  btn.textContent = '...';
  try {
    const url = currentDays > 0 ? `${API_BASE}?days=${currentDays}` : API_BASE;
    const res = await fetch(url);
    data = applySlugFilter(await res.json());
    renderAll();
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch (err) {
    console.error('Failed to load data:', err);
    document.getElementById('last-updated').textContent = 'Error loading data';
  }
  btn.classList.remove('loading');
  btn.textContent = 'Refresh';
}

function renderAll() {
  renderKPIs();
  renderDoughnut();
  renderDailyMini();
  renderTimeline();
  renderWeekday();
  renderHourly();
  renderGeo();
  renderLinks();
  renderFeed();
  renderRecentOverview();
}

// KPI Cards
function renderKPIs() {
  const totalScans = data.summary.reduce((a, s) => a + s.total, 0);
  const uniqueLinks = data.summary.length;
  const topLink = data.summary.length > 0
    ? data.summary.reduce((a, b) => a.total > b.total ? a : b)
    : null;
  const lastScan = data.recent.length > 0 ? timeAgo(data.recent[0].ts) : 'No scans';

  const dest = data.destinations || [];
  const destMap = {};
  dest.forEach(d => destMap[d.slug] = d.label);

  document.getElementById('kpi-cards').innerHTML = `
    <div class="card">
      <div class="kpi-value green">${totalScans}</div>
      <div class="kpi-label">Total Scans</div>
      <div class="kpi-sub">${currentDays > 0 ? 'Last ' + currentDays + ' days' : 'All time'}</div>
    </div>
    <div class="card">
      <div class="kpi-value blue">${uniqueLinks}</div>
      <div class="kpi-label">Active Links</div>
      <div class="kpi-sub">${dest.length} total destinations</div>
    </div>
    <div class="card">
      <div class="kpi-value amber">${topLink ? topLink.total : 0}</div>
      <div class="kpi-label">Top Performer</div>
      <div class="kpi-sub">${topLink ? (destMap[topLink.slug] || topLink.slug) : 'N/A'}</div>
    </div>
    <div class="card">
      <div class="kpi-value" style="font-size:24px;color:var(--text-primary)">${lastScan}</div>
      <div class="kpi-label">Last Scan</div>
      <div class="kpi-sub">${data.recent.length > 0 ? data.recent[0].city + ', ' + data.recent[0].region : ''}</div>
    </div>
  `;
}

// Doughnut chart
function renderDoughnut() {
  const ctx = document.getElementById('chart-doughnut');
  const destMap = {};
  (data.destinations || []).forEach(d => destMap[d.slug] = d.label);

  if (charts.doughnut) charts.doughnut.destroy();
  charts.doughnut = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: data.summary.map(s => destMap[s.slug] || s.slug),
      datasets: [{
        data: data.summary.map(s => s.total),
        backgroundColor: COLORS.slice(0, data.summary.length),
        borderWidth: 0,
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true,
      cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { padding: 16, font: { size: 12 } } }
      }
    }
  });
}

// Mini daily chart on overview
function renderDailyMini() {
  const ctx = document.getElementById('chart-daily-mini');
  const dailyTotals = {};
  data.daily.forEach(d => {
    dailyTotals[d.day] = (dailyTotals[d.day] || 0) + d.count;
  });
  const days = Object.keys(dailyTotals).sort();
  const counts = days.map(d => dailyTotals[d]);

  if (charts.dailyMini) charts.dailyMini.destroy();
  charts.dailyMini = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: days.map(d => formatDate(d)),
      datasets: [{
        data: counts,
        backgroundColor: 'rgba(34,197,94,0.3)',
        borderColor: '#22c55e',
        borderWidth: 1,
        borderRadius: 4,
        hoverBackgroundColor: 'rgba(34,197,94,0.5)'
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } } }
      }
    }
  });
}

// Timeline stacked chart
function renderTimeline() {
  const ctx = document.getElementById('chart-timeline');
  const destMap = {};
  (data.destinations || []).forEach(d => destMap[d.slug] = d.label);

  const slugs = [...new Set(data.daily.map(d => d.slug))];
  const days = [...new Set(data.daily.map(d => d.day))].sort();
  const dailyMap = {};
  data.daily.forEach(d => { dailyMap[d.day + '|' + d.slug] = d.count; });

  const datasets = slugs.map((slug, i) => ({
    label: destMap[slug] || slug,
    data: days.map(day => dailyMap[day + '|' + slug] || 0),
    borderColor: COLORS[i % COLORS.length],
    backgroundColor: COLORS[i % COLORS.length] + '33',
    fill: true,
    tension: 0.3,
    pointRadius: 3,
    pointHoverRadius: 6
  }));

  if (charts.timeline) charts.timeline.destroy();
  charts.timeline = new Chart(ctx, {
    type: 'line',
    data: { labels: days.map(d => formatDate(d)), datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { position: 'bottom', labels: { padding: 16, font: { size: 12 } } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { beginAtZero: true, stacked: true, ticks: { stepSize: 1, font: { size: 11 } } }
      }
    }
  });
}

// Hourly chart
function renderHourly() {
  const ctx = document.getElementById('chart-hourly');
  const counts = new Array(24).fill(0);
  data.recent.forEach(s => {
    const h = new Date(s.ts).getHours();
    counts[h]++;
  });
  const labels = counts.map((_, i) => {
    const ampm = i >= 12 ? 'p' : 'a';
    const h = i === 0 ? 12 : i > 12 ? i - 12 : i;
    return h + ampm;
  });

  if (charts.hourly) charts.hourly.destroy();
  charts.hourly = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: counts,
        backgroundColor: 'rgba(59,130,246,0.3)',
        borderColor: '#3b82f6',
        borderWidth: 1,
        borderRadius: 4

      plugins: { legend: { display: false } },

// Geography
let geoJsonLayer = null;
let geoJsonData = null;

// Load GeoJSON boundaries once
async function loadGeoJSON() {
  if (geoJsonData) return geoJsonData;
  try {
    const res = await fetch('greenville-zips.geojson');
    geoJsonData = await res.json();
  } catch (e) { geoJsonData = null; }
  return geoJsonData;
}

function renderGeo() {
  // Map
  if (!map) {
    map = L.map('map', {
      zoomControl: true,
      attributionControl: false
    }).setView([34.85, -82.39], 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19
    }).addTo(map);
    // Load and render zip boundaries
    loadGeoJSON().then(gj => renderZipBoundaries(gj));
  }

  mapMarkers.forEach(m => map.removeLayer(m));
  mapMarkers = [];

  // Build lat/lon lookup from geo aggregates
  const geoLookup = {};
  (data.geo || []).forEach(g => {
    if (g.lat && g.lon) geoLookup[g.city + '|' + g.region] = { lat: g.lat, lon: g.lon };
  });

  // Plot individual scan dots from recent array
  const bounds = [];
  const scansByLocation = {};
  (data.recent || []).forEach((s, i) => {
    const key = (s.city || 'Unknown') + '|' + (s.region || '');
    const coords = geoLookup[key];
    if (!coords) return;

    // Count scans at this location for jitter spread
    if (!scansByLocation[key]) scansByLocation[key] = 0;
    scansByLocation[key]++;
    const idx = scansByLocation[key];

    // Jitter: spiral pattern so dots fan out from center
    const angle = idx * 2.4; // golden angle
    const dist = 0.002 * Math.sqrt(idx); // spread increases with count
    const lat = coords.lat + dist * Math.cos(angle);
    const lon = coords.lon + dist * Math.sin(angle);

    const slugColor = COLORS[
      [...new Set(data.recent.map(r => r.slug))].indexOf(s.slug) % COLORS.length
    ];

    const marker = L.circleMarker([lat, lon], {
      radius: 5,
      color: slugColor,
      fillColor: slugColor,
      fillOpacity: 0.7,
      weight: 1.5
    }).addTo(map);

    const device = parseUA(s.ua);
    marker.bindPopup(
      `<strong style="color:${slugColor}">${s.slug}</strong><br>` +
      `${s.city || 'Unknown'}${s.region ? ', ' + s.region : ''}<br>` +
      `<span style="opacity:0.7">${device}</span><br>` +
      `<span style="opacity:0.5">${timeAgo(s.ts)}</span>`
    );
    mapMarkers.push(marker);
    bounds.push([lat, lon]);
  });

  if (bounds.length > 0) {
    if (bounds.length === 1) {
      map.setView(bounds[0], 12);
    } else {
      map.fitBounds(bounds, { padding: [40, 40] });
    }
  }

  // Re-color zip boundaries based on scan data
  renderZipBoundaries(geoJsonData);

}

function renderZipBoundaries(gj) {
  if (!gj || !map) return;
  if (geoJsonLayer) map.removeLayer(geoJsonLayer);

  // Build zip scan counts
  const zipCounts = {};
  (data && data.zips || []).forEach(z => { zipCounts[z.postal_code] = z.count; });
  const maxCount = Math.max(1, ...Object.values(zipCounts));

  geoJsonLayer = L.geoJSON(gj, {
    style: function(feature) {
      const zip = feature.properties.ZCTA5CE20 || feature.properties.ZCTA5CE10 || feature.properties.zip;
      const count = zipCounts[zip] || 0;
      if (count === 0) {
        return { fillOpacity: 0.02, weight: 1, color: 'rgba(255,255,255,0.15)', opacity: 0.3, fillColor: '#fff' };
      }
      const intensity = Math.min(count / maxCount, 1);
      return {
        fillColor: '#22c55e',
        fillOpacity: 0.08 + intensity * 0.35,
        weight: 1.5,
        color: '#22c55e',
        opacity: 0.4 + intensity * 0.4
      };
    },
    onEachFeature: function(feature, layer) {
      const zip = feature.properties.ZCTA5CE20 || feature.properties.ZCTA5CE10 || feature.properties.zip;
      const count = zipCounts[zip] || 0;
      if (count > 0) {
        layer.bindTooltip(`<strong>${zip}</strong><br>${count} scan${count !== 1 ? 's' : ''}`, { sticky: true });
      }
    }
  }).addTo(map);

  // Ensure scan dots render on top of boundaries
  mapMarkers.forEach(m => m.bringToFront());

  // Cities table
  document.getElementById('geo-cities-table').innerHTML = data.geo && data.geo.length > 0
    ? `<table class="data-table">
        <thead><tr><th>City</th><th>State</th><th>Scans</th></tr></thead>
        <tbody>${data.geo.map(g => `
          <tr>
            <td>${g.city || 'Unknown'}</td>
            <td>${g.region || ''}</td>
            <td><span class="count-badge">${g.count}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>`
    : '<div class="empty-state"><p>No geo data yet</p></div>';

  // Zips table
  document.getElementById('geo-zips-table').innerHTML = data.zips && data.zips.length > 0
    ? `<table class="data-table">
        <thead><tr><th>Zip Code</th><th>Scans</th></tr></thead>
        <tbody>${data.zips.map(z => `
          <tr>
            <td class="mono">${z.postal_code || 'Unknown'}</td>
            <td><span class="count-badge">${z.count}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>`
    : '<div class="empty-state"><p>No zip code data yet</p></div>';
}

// Links table

  data.summary.forEach(s => destMap[s.slug] = s);

  document.getElementById('links-table').innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          <th>Slug</th>
          <th>Label</th>
          <th>Destination</th>
          <th>Status</th>
          <th>Scans</th>

        ${(data.destinations || []).map(d => {

          </tr>`;

// Recent scans on overview
function renderRecentOverview() {

    ? `<div class="scan-feed">${items.map(scanItemHTML).join('')}</div>`
    : '<div class="empty-state"><p>No scans yet</p></div>';
}

// Live feed
function renderFeed() {
  const items = data.recent || [];
  document.getElementById('feed-list').innerHTML = items.length > 0
    ? `<div class="scan-feed">${items.map(scanItemHTML).join('')}</div>`
    : '<div class="empty-state"><p>No scans yet</p></div>';
}

function scanItemHTML(s) {
  const device = parseUA(s.ua);
  return `
    <div class="scan-item">
      <div class="scan-slug">${s.slug}</div>
      <div class="scan-location">${s.city || 'Unknown'}${s.region ? ', ' + s.region : ''}</div>
      <div class="scan-device">${device}</div>
      <div class="scan-time">${timeAgo(s.ts)}</div>
    </div>`;
}

// Helpers
function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + 'd ago';
  return formatDate(ts.split('T')[0]);
}

function formatDate(d) {
  const parts = d.split('-');
  return parts[1] + '/' + parts[2];
}

function parseUA(ua) {
  if (!ua) return 'Unknown';
  if (ua.includes('curl')) return 'curl (CLI)';
  let browser = 'Browser';
  if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
  else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
  else if (ua.includes('Firefox')) browser = 'Firefox';
  else if (ua.includes('Edg')) browser = 'Edge';

  let os = '';
  if (ua.includes('iPhone')) os = 'iPhone';
  else if (ua.includes('Android')) os = 'Android';
  else if (ua.includes('Windows')) os = 'Windows';
  else if (ua.includes('Mac')) os = 'Mac';

  return browser + (os ? ' / ' + os : '');
}
